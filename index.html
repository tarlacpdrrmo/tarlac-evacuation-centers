<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDRRMO Evacuation Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #0f172a;
            --primary-hover: #334155;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success-bg: #dcfce7;
            --success-text: #166534;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: 'Inter', sans-serif; overflow: hidden; 
            background-color: #f8fafc;
        }
        
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        /* Modern Floating Panel */
        #search-box { 
            position: absolute; top: 20px; left: 60px; z-index: 999; 
            background: var(--surface); padding: 12px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            display: flex; gap: 8px; border: 1px solid var(--border);
        }
        
        #searchInput { 
            padding: 10px 14px; width: 260px; 
            border: 1px solid var(--border); border-radius: 8px; 
            font-family: 'Inter', sans-serif; font-size: 14px;
            transition: all 0.2s ease; outline: none;
        }
        
        #searchInput:focus {
            border-color: #94a3b8;
            box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.2);
        }
        
        #search-box button { 
            padding: 10px 18px; background-color: var(--primary); 
            color: white; border: none; border-radius: 8px; 
            font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: background-color 0.2s ease;
        }
        
        #search-box button:hover { background-color: var(--primary-hover); }
        
        /* Modern Loading & Error Screen */
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; background: var(--surface); padding: 24px 32px; 
            border-radius: 16px; font-size: 15px; color: var(--text-main);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); 
            border: 1px solid var(--border); text-align: center; line-height: 1.6;
            max-width: 600px;
        }

        /* Clean Leaflet Popup Styling */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            padding: 0;
        }
        .leaflet-popup-content {
            margin: 20px;
            font-family: 'Inter', sans-serif;
        }
        
        /* Data Card Inside Popup */
        .card-title {
            font-size: 16px; font-weight: 700; color: var(--text-main);
            margin-bottom: 12px; display: block; line-height: 1.3;
        }
        .card-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        .card-row:last-child { border-bottom: none; }
        .card-label { color: var(--text-muted); font-weight: 500; }
        .card-value { color: var(--text-main); font-weight: 600; text-align: right; }
        
        /* Status Badge */
        .badge {
            display: inline-block; padding: 4px 10px; border-radius: 9999px;
            font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge-available { background-color: var(--success-bg); color: var(--success-text); }
        .badge-default { background-color: #f1f5f9; color: #475569; }

    </style>
</head>
<body>

    <div id="loading">
        <div id="spinner-container" style="margin-bottom: 8px;">
            <svg style="animation: spin 1s linear infinite; height: 24px; width: 24px; color: #0f172a; margin: 0 auto;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </div>
        <strong id="loading-title">Syncing Live Data</strong><br>
        <span id="loading-desc" style="color: #64748b; font-size: 13px;">Pulling from Google Sheets...</span>
        <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
    </div>

    <div id="search-box">
        <input type="text" id="searchInput" placeholder="Search municipality or name...">
        <button onclick="searchMap()">Search</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <script>
        // Error Handler
        window.onerror = function(message, source, lineno) {
            document.getElementById('spinner-container').style.display = 'none';
            document.getElementById('loading-title').innerHTML = "❌ <b style='color: #ef4444;'>CRITICAL ERROR:</b>";
            document.getElementById('loading-desc').innerHTML = message + "<br><br>Check line " + lineno + " for deleted quotes.";
            return false;
        };

        // Initialize Map
        var map = L.map('map', { zoomControl: false }).setView([15.58, 120.59], 10);
        L.control.zoom({ position: 'topleft' }).addTo(map);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { 
            maxZoom: 19,
            attribution: '© OpenStreetMap | © CARTO'
        }).addTo(map);

        // =========================================================================
        // 🚨 IMPORTANT: PASTE YOUR CSV PUBLISH LINK BELOW 🚨
        // =========================================================================
        var sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQd_7XwY0Z_Dzs9THcJrXePJOdcchsr8XRGJ3B1E05RJR3j6Z-Y_8lak51-tM-znL2CIoOWwRP83tnM/pubhtml?gid=1609154454&single=true";
        
        // --- AUTO-HEALING LINK ---
        // Automatically converts a Webpage link into a raw CSV data link
        if (sheetCsvUrl.includes("pubhtml")) {
            sheetCsvUrl = sheetCsvUrl.replace("pubhtml", "pub?output=csv");
        }
        
        var markers = [];

        // Validate Link
        if (sheetCsvUrl === "https://docs.google.com/spreadsheets/d/e/2PACX-1vQd_7XwY0Z_Dzs9THcJrXePJOdcchsr8XRGJ3B1E05RJR3j6Z-Y_8lak51-tM-znL2CIoOWwRP83tnM/pubhtml?gid=1609154454&single=true") {
            document.getElementById('spinner-container').style.display = 'none';
            document.getElementById('loading-title').innerHTML = "⚠️ <b>Action Required:</b>";
            document.getElementById('loading-desc').innerHTML = "Please paste your Google Sheets link into line 147 of the code.";
        } 
        else {
            // Fetch Data
            Papa.parse(sheetCsvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    var data = results.data;
                    var validPointsPlotted = 0;
                    
                    data.forEach(function(row) {
                        
                        // Strip out completely all invisible characters and # symbols from the headers
                        var cleanRow = {};
                        for (var key in row) {
                            var cleanKey = key.replace(/[^a-zA-Z0-9 ]/g, "").trim().toUpperCase();
                            cleanRow[cleanKey] = row[key];
                        }
                        
                        var keys = Object.keys(cleanRow);
                        
                        var latKey = keys.find(k => k.includes('LATITUDE'));
                        var lngKey = keys.find(k => k.includes('LONGITUDE'));
                        var locKey = keys.find(k => k.includes('LOCATION'));
                        var munKey = keys.find(k => k.includes('MUNICAPLITY') || k.includes('MUNICIPALITY'));
                        var totalCapKey = keys.find(k => k.includes('TOTAL CAPACITY'));
                        var curCapKey = keys.find(k => k.includes('CURRENTCAP') || k.includes('CURRENT CAP'));
                        var statusKey = keys.find(k => k.includes('STATUS'));

                        var lat = latKey ? parseFloat(cleanRow[latKey]) : NaN;
                        var lng = lngKey ? parseFloat(cleanRow[lngKey]) : NaN;
                        var name = (locKey && cleanRow[locKey]) ? cleanRow[locKey] : "Unknown Facility";
                        var mun = (munKey && cleanRow[munKey]) ? cleanRow[munKey] : "Unknown";
                        var totalCap = (totalCapKey && cleanRow[totalCapKey]) ? cleanRow[totalCapKey] : "0";
                        var currentCap = (curCapKey && cleanRow[curCapKey]) ? cleanRow[curCapKey] : "0";
                        var status = (statusKey && cleanRow[statusKey]) ? cleanRow[statusKey].toUpperCase().trim() : "UNKNOWN";

                        if (!isNaN(lat) && !isNaN(lng)) {
                            validPointsPlotted++;
                            
                            var badgeClass = (status === "AVAILABLE") ? "badge-available" : "badge-default";

                            var popupText = `
                                <div>
                                    <span class="card-title">${name}</span>
                                    <div class="card-row">
                                        <span class="card-label">Municipality</span>
                                        <span class="card-value">${mun}</span>
                                    </div>
                                    <div class="card-row">
                                        <span class="card-label">Capacity (Cur / Tot)</span>
                                        <span class="card-value">${currentCap} <span style="color:#cbd5e1; margin:0 4px;">/</span> ${totalCap}</span>
                                    </div>
                                    <div class="card-row" style="padding-top: 12px; margin-top: 4px;">
                                        <span class="card-label">Status</span>
                                        <span class="badge ${badgeClass}">${status}</span>
                                    </div>
                                </div>
                            `;

                            var marker = L.marker([lat, lng]).addTo(map).bindPopup(popupText, { minWidth: 260 });
                            marker.searchData = { name: name, mun: mun, lat: lat, lng: lng };
                            markers.push(marker);
                        }
                    });

                    // X-RAY DIAGNOSTIC: Prints exactly what is going wrong if it fails again
                    if (validPointsPlotted === 0) {
                        var headersFound = data.length > 0 ? Object.keys(data[0]).join(", ") : "No columns found";
                        var htmlWarning = headersFound.includes("<") ? "<br><br><b style='color:#ef4444;'>ERROR: You pasted a standard Share link. You must use File > Share > Publish to Web.</b>" : "";
                        
                        document.getElementById('spinner-container').style.display = 'none';
                        document.getElementById('loading-title').innerHTML = "⚠️ <b>Data Connection Failed</b>";
                        document.getElementById('loading-desc').innerHTML = `
                            We connected to your link, but could not read the coordinates.<br><br>
                            <b>Here are the exact headers the code saw:</b><br>
                            <div style='background:#f1f5f9; padding:8px; border-radius:4px; margin-top:8px; font-family:monospace; color:#ef4444; word-wrap:break-word; font-size:12px;'>
                                ${headersFound}
                            </div>
                            ${htmlWarning}
                        `;
                    } else {
                        document.getElementById('loading').style.display = 'none';
                    }
                },
                error: function(err) {
                    document.getElementById('spinner-container').style.display = 'none';
                    document.getElementById('loading-title').innerHTML = "❌ <b>Network Blocked</b>";
                    document.getElementById('loading-desc').innerHTML = "Could not reach the link. Make sure the sheet is public.";
                }
            });
        }

        // Search Logic
        function searchMap() {
            var query = document.getElementById('searchInput').value.toLowerCase();
            var found = false;
            
            for (var i = 0; i < markers.length; i++) {
                var item = markers[i].searchData;
                if (item.name.toLowerCase().includes(query) || item.mun.toLowerCase().includes(query)) {
                    map.setView([item.lat, item.lng], 14);
                    markers[i].openPopup();
                    found = true;
                    break;
                }
            }
            if (!found && query.trim() !== "") alert("Location not found.");
        }

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchMap();
        });

        setTimeout(() => map.invalidateSize(), 500);
    </script>
</body>
</html>
