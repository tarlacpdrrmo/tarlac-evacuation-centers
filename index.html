<!DOCTYPE html>
<html>
<head>
    <title>Evacuation Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial; }
        
        /* Top 70% for the Map */
        #map { height: 70%; width: 100%; }
        
        /* Search Bar Floating on the Map */
        #search-box {
            position: absolute; top: 15px; left: 55px; z-index: 999;
            background: white; padding: 10px; border-radius: 4px; box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        
        /* Bottom 30% for the Sheet */
        #sheet { height: 30%; width: 100%; border-top: 2px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="search-box">
        <input type="text" id="searchInput" placeholder="Search...">
        <button onclick="searchMap()">Search</button>
    </div>
    <div id="map"></div>

    <div id="sheet">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQd_7XwY0Z_Dzs9THcJrXePJOdcchsr8XRGJ3B1E05RJR3j6Z-Y_8lak51-tM-znL2CIoOWwRP83tnM/pubhtml?gid=1609154454&single=true"></iframe>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Setup Map
        var map = L.map('map').setView([15.58, 120.59], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. Data
        var data = [
            { mun: "Lapaz", name: "PAGCOR Building", lat: 15.434096, lng: 120.727424 },
            { mun: "Province of Tarlac", name: "Provincial Evacuation Center", lat: 15.494798, lng: 120.577911 },
            { mun: "City of Tarlac", name: "Tibag Evacuation Center", lat: 15.490824, lng: 120.569726 },
            { mun: "City of Tarlac", name: "Baras-Baras Evacuation Center", lat: 15.521644, lng: 120.567399 },
            { mun: "San Clemente", name: "San Clemente Center", lat: 15.714959, lng: 120.358695 },
            { mun: "Paniqui", name: "Bacao Center", lat: 15.686438, lng: 120.559574 },
            { mun: "City of Tarlac", name: "San Isidro Center", lat: 15.701675, lng: 120.57702 },
            { mun: "Moncada", name: "Sta. Lucia East", lat: 15.698746, lng: 120.584701 },
            { mun: "Moncada", name: "Sta. Lucia West", lat: 15.700413, lng: 120.564336 }
        ];

        // 3. Add Markers
        var markers = [];
        data.forEach(function(loc) {
            var marker = L.marker([loc.lat, loc.lng]).addTo(map).bindPopup(`<b>${loc.name}</b><br>${loc.mun}`);
            marker.searchData = loc;
            markers.push(marker);
        });

        // 4. Search Function
        function searchMap() {
            var query = document.getElementById('searchInput').value.toLowerCase();
            for (var i = 0; i < markers.length; i++) {
                var item = markers[i].searchData;
                if (item.name.toLowerCase().includes(query) || item.mun.toLowerCase().includes(query)) {
                    map.setView([item.lat, item.lng], 14);
                    markers[i].openPopup();
                    return;
                }
            }
            alert("Not found.");
        }

        // 5. Fix Map Load Size
        setTimeout(() => map.invalidateSize(), 500);
    </script>
</body>
</html>
