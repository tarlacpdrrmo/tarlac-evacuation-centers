<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Evacuation Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; overflow: hidden; 
        }
        #map { 
            height: 100vh; width: 100vw; z-index: 1; 
        }
        #search-box {
            position: absolute; top: 15px; left: 55px; z-index: 999;
            background: white; padding: 10px; border-radius: 4px; box-shadow: 0 1px 5px rgba(0,0,0,0.4);
        }
        #searchInput {
            padding: 6px; width: 220px; border: 1px solid #ccc; border-radius: 3px;
        }
        #search-box button {
            padding: 6px 10px; background-color: #2c3e50; color: white; border: none; border-radius: 3px; cursor: pointer;
        }
        #search-box button:hover { background-color: #1a252f; }
        
        /* Loading Screen */
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; background: rgba(255,255,255,0.9); padding: 20px; border-radius: 8px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loading">Syncing live data from Google Sheets...</div>

    <div id="search-box">
        <input type="text" id="searchInput" placeholder="Search municipality or name...">
        <button onclick="searchMap()">Search</button>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <script>
        // 1. Setup Map - Centered on Tarlac
        var map = L.map('map').setView([15.58, 120.59], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

        // ========================================================
        // 🚨 IMPORTANT: PASTE YOUR CSV PUBLISH LINK BELOW 🚨
        // ========================================================
        var sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQd_7XwY0Z_Dzs9THcJrXePJOdcchsr8XRGJ3B1E05RJR3j6Z-Y_8lak51-tM-znL2CIoOWwRP83tnM/pubhtml?gid=1609154454&single=true";
        
        var markers = []; // Will hold our map pins

        // 2. Fetch and Parse the Google Sheet dynamically
        Papa.parse(sheetCsvUrl, {
            download: true,
            header: true, // Tells the parser to use your top row as variable names
            skipEmptyLines: true,
            complete: function(results) {
                var data = results.data;
                
                data.forEach(function(row) {
                    // Pulling exact column headers based on your spreadsheet screenshot
                    var lat = parseFloat(row['LATITUDE']);
                    var lng = parseFloat(row['LONGITUDE']);
                    var name = row['LOCATION'];
                    var mun = row['MUNICAPLITY/CITY']; // Using the exact spelling from your sheet
                    var cap = row['TOTAL CAPACITY'];
                    var status = row['Status'];

                    // Skip rows without coordinates
                    if (isNaN(lat) || isNaN(lng)) return;

                    var popupText = `
                        <div style="font-size: 14px;">
                            <strong style="font-size: 16px; display: block; margin-bottom: 5px;">${name}</strong>
                            <b>Municipality:</b> ${mun}<br>
                            <b>Capacity:</b> ${cap} persons<br>
                            <b>Status:</b> <span style="color: green; font-weight: bold;">${status}</span><br>
                        </div>
                    `;

                    var marker = L.marker([lat, lng]).addTo(map).bindPopup(popupText);
                    
                    // Save data to marker for the search function
                    marker.searchData = { name: name, mun: mun, lat: lat, lng: lng };
                    markers.push(marker);
                });

                // Hide the loading screen once points are plotted
                document.getElementById('loading').style.
